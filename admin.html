<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dạ Êm – Admin Dashboard</title>
<link rel="preload" href="fonts/playfair-display-vietnamese-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/lato-latin-ext-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg viewBox="0 0 60 60" fill="none" width="32" height="32">
      <path d="M30 5 C18 5,8 17,8 30 C8 43,18 55,30 55" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <path d="M30 5 C42 5,52 17,52 30 C52 43,42 55,30 55" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>
      <circle cx="27" cy="26" r="5" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <path d="M24 31 Q27 38 30 36" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <circle cx="22" cy="10" r="1.5" fill="currentColor" opacity="0.7"/>
    </svg>
    <div>
      <span class="logo-text">Dạ Êm</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-page="dashboard" onclick="goPage('dashboard')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Tổng Quan
    </button>
    <button class="nav-item" data-page="orders" onclick="goPage('orders')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Hóa Đơn
      <span class="badge" id="pending-badge">0</span>
    </button>
    <button class="nav-item" data-page="inventory" onclick="goPage('inventory')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m21 16-4-4 4-4"/><path d="M15 12H3"/><path d="m3 8 4 4-4 4"/></svg>
      Kho Hàng
    </button>
    <button class="nav-item" data-page="customers" onclick="goPage('customers')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Khách Hàng
    </button>
    <button class="nav-item" data-page="analytics" onclick="goPage('analytics')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Phân Tích
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-profile">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name">Admin</div>
        <div class="admin-role">Quản trị viên</div>
      </div>
    </div>
    <button class="logout-btn" onclick="adminLogout()" title="Đăng xuất">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main-wrap">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="page-title">Tổng Quan</h1>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Tìm kiếm..." id="global-search" oninput="globalSearch(this.value)">
      </div>
      <a href="index.html" class="view-store-btn">← Xem cửa hàng</a>
    </div>
  </header>

  <!-- Page Content -->
  <main class="content" id="content">
    <!-- Pages rendered by JS -->
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal-panel" id="order-modal-content"></div>
</div>

<!-- Toast -->
<div class="a-toast" id="a-toast"></div>

<script src="admin.js"></script>
</body>
</html>
